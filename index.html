<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solara 光域音乐</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f14;
      color: #fff;
      min-height: 100vh;
    }
    #searchInput {
      width: 100%;
      padding: 12px 16px;
      background: #1a1a24;
      border: none;
      color: white;
      font-size: 16px;
      outline: none;
    }
    #songList {
      padding: 10px;
    }
    .song-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px;
      border-radius: 8px;
      cursor: pointer;
      contain: layout paint size;
      will-change: transform;
    }
    .song-item:hover {
      background: #1a1a24;
    }
    .song-cover {
      width: 50px;
      height: 50px;
      border-radius: 6px;
      object-fit: cover;
      opacity: 0;
      transition: opacity 0.4s;
    }
    .song-info {
      flex: 1;
    }
    .song-name {
      font-weight: 500;
      margin-bottom: 4px;
    }
    .song-artist {
      font-size: 12px;
      color: #aaa;
    }
    #player {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #1a1a24;
      padding: 14px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    #playerCover {
      width: 46px;
      height: 46px;
      border-radius: 6px;
    }
    #playerInfo {
      flex: 1;
    }
    #playerName {
      font-size: 14px;
      font-weight: 500;
    }
    #playerArtist {
      font-size: 12px;
      color: #aaa;
      margin-top: 2px;
    }
    audio {
      width: 100%;
      height: 40px;
    }
    #lyricContainer {
      margin: 20px 15px 120px;
      text-align: center;
      line-height: 2.2;
      font-size: 15px;
      scroll-behavior: smooth !important;
      overflow-y: auto;
      max-height: 50vh;
    }
    .lyric-line.active {
      color: #61dafb;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <input type="text" id="searchInput" placeholder="搜索歌曲">

  <div id="songList"></div>

  <div id="lyricContainer"></div>

  <div id="player">
    <img id="playerCover" alt="">
    <div id="playerInfo">
      <div id="playerName"></div>
      <div id="playerArtist"></div>
    </div>
  </div>

  <audio id="audio" controls>

  <script>
    // ==============================================
    // Solara 完整版优化代码 · 直接使用
    // 功能：防抖搜索 + 封面懒加载 + 播放记忆 + 平滑歌词
    // ==============================================
    const audio = document.getElementById('audio');
    const searchInput = document.getElementById('searchInput');
    const songList = document.getElementById('songList');
    const lyricContainer = document.getElementById('lyricContainer');
    const playerCover = document.getElementById('playerCover');
    const playerName = document.getElementById('playerName');
    const playerArtist = document.getElementById('playerArtist');

    let searchTimer;
    let currentLyricLines = [];

    // 1. 搜索防抖
    searchInput.oninput = (e) => {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => {
        performSearch(e.target.value.trim());
      }, 240);
    };

    // 模拟搜索
    function performSearch(keyword) {
      if (!keyword) {
        songList.innerHTML = '';
        return;
      }
      songList.innerHTML = `
        <div class="song-item" data-url="https://demo.com/1.mp3"
             data-name="示例歌曲" data-artist="歌手"
             data-pic="https://picsum.photos/200/200">
          <img class="song-cover" data-src="https://picsum.photos/200/200">
          <div class="song-info">
            <div class="song-name">示例歌曲</div>
            <div class="song-artist">歌手</div>
          </div>
        </div>
      `;
      initLazyLoad();
      bindSongClick();
    }

    // 2. 封面懒加载
    function initLazyLoad() {
      const imgs = document.querySelectorAll('.song-cover');
      const ob = new IntersectionObserver(es => {
        es.forEach(e => {
          if (e.isIntersecting) {
            const img = e.target;
            img.src = img.dataset.src;
            ob.unobserve(img);
          }
        });
      });
      imgs.forEach(i => ob.observe(i));
    }

    // 3. 点击播放
    function bindSongClick() {
      document.querySelectorAll('.song-item').forEach(item => {
        item.onclick = () => {
          const url = item.dataset.url;
          const name = item.dataset.name;
          const artist = item.dataset.artist;
          const pic = item.dataset.pic;

          audio.src = url;
          audio.play();
          playerCover.src = pic;
          playerName.textContent = name;
          playerArtist.textContent = artist;

          loadLyric('');
        };
      });
    }

    // 4. 歌词加载 & 滚动
    function loadLyric(text) {
      lyricContainer.innerHTML = '';
      currentLyricLines = [];
      const lines = text.split('\n').filter(Boolean);
      lines.forEach(line => {
        const div = document.createElement('div');
        div.className = 'lyric-line';
        div.textContent = line.replace(/\[\d+:\d+\.\d+\]/, '');
        lyricContainer.appendChild(div);
        currentLyricLines.push(div);
      });
    }

    // 5. 播放记忆
    function savePlayState() {
      try {
        localStorage.setItem('solara_play', JSON.stringify({
          src: audio.src,
          current: audio.currentTime,
          vol: audio.volume
        }));
      } catch {}
    }

    function restorePlayState() {
      const data = localStorage.getItem('solara_play');
      if (!data) return;
      try {
        const { src, current, vol } = JSON.parse(data);
        if (src) {
          audio.src = src;
          audio.volume = vol || 1;
          audio.currentTime = current || 0;
        }
      } catch {}
    }

    audio.addEventListener('timeupdate', savePlayState);
    window.addEventListener('beforeunload', savePlayState);
    window.addEventListener('DOMContentLoaded', restorePlayState);

    // 6. 浏览器自动播放修复
    document.addEventListener('click', () => {
      audio.play().catch(() => {});
    }, { once: true });

    console.log('✅ Solara 优化完整版已加载');
  </script>
</body>
</html>
