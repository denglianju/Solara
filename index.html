<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
  <title>Solara 音乐</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<!-- ============================================== -->
<!-- ！！！下方是你原版 PC 端代码，完全 100% 没动！！！ -->
<!-- ============================================== -->
<div id="app" class="app-container">
  <div class="sidebar">
    <div class="logo">
      <h2>Solara</h2>
    </div>
    <div class="menu">
      <div class="menu-item active" data-page="player">
        <i class="fa-solid fa-music"></i>
        <span>播放器</span>
      </div>
      <div class="menu-item" data-page="search">
        <i class="fa-solid fa-search"></i>
        <span>搜索</span>
      </div>
      <div class="menu-item" data-page="playlist">
        <i class="fa-solid fa-list"></i>
        <span>歌单</span>
      </div>
      <div class="menu-item" data-page="settings">
        <i class="fa-solid fa-gear"></i>
        <span>设置</span>
      </div>
    </div>
  </div>

  <div class="main-content">
    <div class="top-nav">
      <div class="nav-title">播放器</div>
      <div class="nav-user">
        <div class="user-info">
          <span>游客</span>
        </div>
      </div>
    </div>

    <div class="page-container">
      <div class="player-page active">
        <div class="player-left">
          <div class="album-cover">
            <img id="albumImg" src="">
          </div>
          <div class="song-info">
            <div id="songName">歌曲名</div>
            <div id="artistName">歌手</div>
          </div>
          <div class="progress-container">
            <span id="currentTime">00:00</span>
            <div class="progress-bar">
              <div id="progress"></div>
            </div>
            <span id="duration">03:45</span>
          </div>
          <div class="player-controls">
            <button id="prevBtn" class="control-btn">
              <i class="fa-solid fa-backward-step"></i>
            </button>
            <button id="playBtn" class="control-btn play-btn">
              <i class="fa-solid fa-play"></i>
            </button>
            <button id="nextBtn" class="control-btn">
              <i class="fa-solid fa-forward-step"></i>
            </button>
            <button id="modeBtn" class="control-btn">
              <i class="fa-solid fa-shuffle"></i>
            </button>
          </div>
        </div>

        <div class="player-right">
          <div class="playlist-header">
            <span>播放列表</span>
          </div>
          <div class="playlist-container" id="playlistContainer">
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ============================================== -->
<!-- 新增：酷我音乐 移动端界面（不影响 PC） -->
<!-- ============================================== -->
<div class="mobile-kw-wrapper">
  <div class="kw-header">
    <div class="kw-title">酷我音乐</div>
    <div class="kw-search-box">
      <i class="fa-solid fa-search"></i>
      <input type="text" placeholder="搜索歌曲、歌手、专辑">
    </div>
    <div class="kw-user">
      <i class="fa-solid fa-user"></i>
    </div>
  </div>

  <div class="kw-body">
    <div class="kw-player-section">
      <div class="kw-disc" id="kwDisc"></div>
      <div class="kw-song-info">
        <div class="kw-song" id="kwSong">歌曲名</div>
        <div class="kw-artist" id="kwArtist">歌手</div>
      </div>
      <div class="kw-progress-bar">
        <span id="kwCurrTime">00:00</span>
        <div class="kw-bar-bg">
          <div class="kw-bar-active" id="kwProgress"></div>
        </div>
        <span id="kwTotalTime">03:45</span>
      </div>
      <div class="kw-controls">
        <div class="kw-btn" id="kwPrev">
          <i class="fa-solid fa-backward-step"></i>
        </div>
        <div class="kw-play-btn" id="kwPlay">
          <i class="fa-solid fa-play" id="kwPlayIcon"></i>
        </div>
        <div class="kw-btn" id="kwNext">
          <i class="fa-solid fa-forward-step"></i>
        </div>
      </div>
    </div>

    <div class="kw-playlist-section">
      <div class="kw-section-title">播放列表</div>
      <div class="kw-list" id="kwPlaylist"></div>
    </div>
  </div>

  <div class="kw-bottom-bar">
    <div class="kw-bottom-item active">
      <i class="fa-solid fa-music"></i>
      <span>播放器</span>
    </div>
    <div class="kw-bottom-item">
      <i class="fa-solid fa-search"></i>
      <span>搜索</span>
    </div>
    <div class="kw-bottom-item">
      <i class="fa-solid fa-compact-disc"></i>
      <span>歌单</span>
    </div>
    <div class="kw-bottom-item">
      <i class="fa-solid fa-user"></i>
      <span>我的</span>
    </div>
  </div>
</div>

<script src="js/index.js"></script>
<script src="js/mobile.js"></script>
</body>
</html>
